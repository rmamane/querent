# Fill before launching: image (Docker Hub) + repo_url (public GitHub).
# git_sha: null -> launcher pins current HEAD.
phase: p3
project: querent
image: docker.io/REPLACE_ME/querent-deps:cu128-t271-v1
repo_url: https://github.com/REPLACE_ME/querent.git
git_sha: null
# shuffled-routing + frozen-gate controls added at P3 time (needs a control flag in metric_bank)
cells:
  - {experiment: p3/a0, seeds: [0, 1]}
  - {experiment: p3/b1, seeds: [0, 1]}
  - {experiment: p3/b1_sigmoid, seeds: [0, 1]}
  - {experiment: p3/b1_top2, seeds: [0, 1]}
  - {experiment: p3/b1_vector, seeds: [0, 1]}
  - {experiment: p3/b1_headlr, seeds: [0, 1]}
  - {experiment: p3/b1_prior, seeds: [0, 1]}
  - {experiment: p3/b1_replace, seeds: [0, 1]}
  - {experiment: p3/b1_m4, seeds: [0, 1]}
  - {experiment: p3/b1_m64, seeds: [0, 1]}
vast:
  gpu_name: RTX_4090
  num_gpus: 1
  price_max: 0.45
  disk: 64
  reliability_min: 0.98
  inet_down_min: 200
  cuda_min: "12.4"
env_passthrough: [WANDB_API_KEY]
