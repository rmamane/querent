# Fill before launching: image (Docker Hub) + repo_url (public GitHub).
# git_sha: null -> launcher pins current HEAD.
phase: p4
project: querent
image: docker.io/rmamane/querent-deps:cu128-t271-v1
repo_url: https://github.com/rmamane/querent.git
git_sha: null
cells:
  - {experiment: p4/a0, seeds: [0, 1]}
  - {experiment: p4/b2_r4, seeds: [0, 1]}
  - {experiment: p4/b2, seeds: [0, 1]}
  - {experiment: p4/b2_mlp, seeds: [0, 1]}
  - {experiment: p4/b2_replace, seeds: [0, 1]}
  - {experiment: p4/b2_k, seeds: [0, 1]}
  - {experiment: p4/b2_qk, seeds: [0, 1]}
vast:
  gpu_name: RTX_3090   # dense cheap-bid supply, low contention; 5090 = fastest but contested (see drill A/B)
  num_gpus: 1
  price_max: 0.15
  disk: 64
  reliability_min: 0.98
  inet_down_min: 200
  cuda_min: "12.4"
env_passthrough: [WANDB_API_KEY]
