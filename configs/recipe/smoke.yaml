# 1-epoch local sanity recipe: fp32-friendly, no heavy aug, tiny batches.
epochs: 1
batch_size: 128
optimizer:
  lr: 1.0e-3
  weight_decay: 0.05
  betas: [0.9, 0.999]
  eps: 1.0e-8
schedule:
  warmup_epochs: 0
  min_lr: 1.0e-5
label_smoothing: 0.1
mixup:
  mixup_alpha: 0.0
  cutmix_alpha: 0.0
  prob: 0.0
  switch_prob: 0.5
  mode: batch
randaug: null
random_erasing:
  p: 0.0
  mode: pixel
drop_path_rate: 0.0
ema:
  enabled: false
  decay: 0.9995
aux_loss_start_epoch: 0
